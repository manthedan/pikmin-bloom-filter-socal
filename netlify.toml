[build]
  publish = "public"
  command = "npm run netlify:build"

[build.environment]
  NODE_VERSION = "22"

[[headers]]
  for = "/data/cell-tiles/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/vendor/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/data/manifest.json"
  [headers.values]
    Cache-Control = "public, max-age=300"

[[headers]]
  for = "/data/cell-tiles-index.json"
  [headers.values]
    Cache-Control = "public, max-age=300"
